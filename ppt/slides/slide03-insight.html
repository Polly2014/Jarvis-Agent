<!DOCTYPE html>
<html>
<head>
<style>
html { background: #0F1119; }
body {
  width: 720pt; height: 405pt; margin: 0; padding: 0;
  font-family: Arial, sans-serif;
  display: flex; flex-direction: column;
}
.header {
  padding: 16pt 40pt 8pt;
}
.header h1 { color: #FFFFFF; font-size: 22pt; margin: 0; }
.header p { color: #8B5CF6; font-size: 11pt; margin: 4pt 0 0 0; }
.content {
  flex: 1; padding: 4pt 36pt 12pt;
  display: flex; flex-wrap: wrap; gap: 10pt;
}
.kernel {
  background: #1A1D2E; border-radius: 8pt;
  padding: 12pt 14pt; flex: 1 1 44%;
  display: flex; flex-direction: column;
}
.kernel.k1 { border-left: 3pt solid #3B82F6; }
.kernel.k2 { border-left: 3pt solid #10B981; }
.kernel.k3 { border-left: 3pt solid #F59E0B; }
.kernel.k4 { border-left: 3pt solid #8B5CF6; }
.kernel-header {
  display: flex; align-items: center; gap: 6pt;
  margin-bottom: 5pt;
}
.kernel-icon { font-size: 16pt; margin: 0; }
.kernel-title { color: #FFFFFF; font-size: 13pt; margin: 0; }
.kernel p { color: #9CA3AF; font-size: 9pt; margin: 2pt 0 0 0; line-height: 1.35; }
.kernel .quote { color: #D1D5DB; font-size: 9pt; font-style: italic; margin: 4pt 0 0 0; }
.footer-quote {
  padding: 0 40pt 14pt;
  text-align: center;
}
.footer-quote p {
  color: #6B7280; font-size: 10pt; font-style: italic; margin: 0;
}
</style>
</head>
<body>
<div class="header">
  <h1>🧬 四大内核：Agent 的灵魂设计</h1>
  <p>FOUR KERNELS — 什么是"真正的 Agent"？</p>
</div>
<div class="content">
  <div class="kernel k1">
    <div class="kernel-header">
      <p class="kernel-icon">🌉</p>
      <h3 class="kernel-title">遇水搭桥</h3>
    </div>
    <p>遇到新任务时自主创建能力，而非等待配置。</p>
    <p class="quote">"遇到水，就搭一座桥。"</p>
  </div>
  <div class="kernel k2">
    <div class="kernel-header">
      <p class="kernel-icon">💪</p>
      <h3 class="kernel-title">肌肉涌现</h3>
    </div>
    <p>能力从交互中自然生长，而非预先编程。</p>
    <p class="quote">"能力不是配置出来的，是用出来的。"</p>
  </div>
  <div class="kernel k3">
    <div class="kernel-header">
      <p class="kernel-icon">🎭</p>
      <h3 class="kernel-title">渐进性格</h3>
    </div>
    <p>骨架（价值观）由设计决定，肌肉（偏好）由交互涌现。</p>
    <p class="quote">"每个 Jarvis 都独一无二——因为每个用户都独一无二。"</p>
  </div>
  <div class="kernel k4">
    <div class="kernel-header">
      <p class="kernel-icon">🧠</p>
      <h3 class="kernel-title">记忆迭代</h3>
    </div>
    <p>没有记忆就没有进化。持续记录 → 检索关联 → 形成判断。</p>
    <p class="quote">"没有记忆，就没有进化。"</p>
  </div>
</div>
<div class="footer-quote">
  <p>Agent 不是等待配置的工具，而是主动探索的伙伴。</p>
</div>
</body>
</html>
